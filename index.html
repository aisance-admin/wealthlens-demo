<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WealthLens — Portfolio Health</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{
    --navy:#0e1b2c; --navy2:#142539; --panel:#172c44; --line:#24405e;
    --ink:#eaf1f8; --muted:#9fb3c8; --gold:#c9a227; --gold2:#e3c25a;
    --good:#3fb98c; --watch:#e0a93b; --risk:#e0584e;
    --equity:#4f86c6; --bond:#5bb7a8; --fund:#c9a227; --note:#c97b3a;
    --deriv:#9b6fc4; --cash:#7f93a6; --alt:#e07b66;
    --radius:14px; --shadow:0 8px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:radial-gradient(1200px 600px at 70% -10%, #1b3350 0%, var(--navy) 55%) fixed;
    color:var(--ink); font-family:"Segoe UI",Inter,system-ui,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; min-height:100vh;
  }
  a{color:var(--gold2)}
  .wrap{max-width:1240px;margin:0 auto;padding:22px 22px 80px}
  header.top{display:flex;align-items:center;gap:16px;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:13px}
  .logo{width:42px;height:42px;border-radius:11px;background:linear-gradient(145deg,var(--gold),#9c7d18);
    display:flex;align-items:center;justify-content:center;font-weight:800;color:#1a1405;font-size:20px;box-shadow:var(--shadow)}
  .brand h1{font-size:20px;margin:0;letter-spacing:.3px}
  .brand .sub{color:var(--muted);font-size:12.5px;margin-top:2px}
  .ctrls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .seg{display:inline-flex;background:var(--navy2);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .seg button{background:transparent;border:0;color:var(--muted);padding:8px 13px;cursor:pointer;font-size:13px;font-weight:600}
  .seg button.on{background:var(--gold);color:#1a1405}
  .btn{background:var(--gold);color:#1a1405;border:0;border-radius:10px;padding:9px 15px;font-weight:700;cursor:pointer;font-size:13px}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
  .btn.ghost:hover{border-color:var(--gold)}
  .btn:disabled{opacity:.45;cursor:default}

  /* landing */
  .hero{background:linear-gradient(180deg,var(--panel),var(--navy2));border:1px solid var(--line);
    border-radius:var(--radius);padding:30px;box-shadow:var(--shadow)}
  .hero h2{margin:0 0 8px;font-size:23px}
  .hero p{color:var(--muted);margin:0 0 22px;max-width:760px;line-height:1.55}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .src{background:var(--navy);border:1px solid var(--line);border-radius:12px;padding:18px;cursor:pointer;transition:.15s;position:relative}
  .src:hover{border-color:var(--gold);transform:translateY(-2px)}
  .src .ic{font-size:24px;margin-bottom:9px}
  .src h3{margin:0 0 6px;font-size:15px}
  .src p{font-size:12.5px;color:var(--muted);margin:0;line-height:1.45}
  .src .tag{position:absolute;top:12px;right:12px;font-size:10px;color:var(--gold2);border:1px solid var(--line);border-radius:20px;padding:2px 8px}

  /* tabs */
  nav.tabs{display:flex;gap:6px;margin:4px 0 18px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:0}
  nav.tabs button{background:transparent;border:0;border-bottom:2px solid transparent;color:var(--muted);
    padding:11px 15px;cursor:pointer;font-size:13.5px;font-weight:600}
  nav.tabs button.on{color:var(--ink);border-bottom-color:var(--gold)}
  nav.tabs button:hover{color:var(--ink)}

  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:18px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
  .card .k{color:var(--muted);font-size:12px;letter-spacing:.3px;text-transform:uppercase}
  .card .v{font-size:26px;font-weight:800;margin-top:6px}
  .card .v small{font-size:14px;font-weight:600;color:var(--muted)}
  .card .d{font-size:12px;margin-top:5px;color:var(--muted)}

  .row{display:grid;grid-template-columns:1.15fr .85fr;gap:16px}
  @media(max-width:900px){.row{grid-template-columns:1fr}.grid4{grid-template-columns:repeat(2,1fr)}}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:16px}
  .panel h3{margin:0 0 14px;font-size:15px;display:flex;align-items:center;gap:8px}
  .panel h3 .hint{font-size:11.5px;color:var(--muted);font-weight:500}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.3px;cursor:pointer;user-select:none}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  tbody tr:hover{background:rgba(255,255,255,.025)}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px;vertical-align:middle}
  .flag{color:var(--risk);font-weight:700}
  .legend{display:flex;flex-direction:column;gap:8px}
  .legend .li{display:flex;align-items:center;justify-content:space-between;font-size:13px}
  .legend .li .lbl{display:flex;align-items:center;gap:0}
  .bar{height:9px;border-radius:6px;background:var(--navy);overflow:hidden;margin-top:4px}
  .bar > i{display:block;height:100%}

  .gauge-wrap{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
  .score-sub{display:grid;grid-template-columns:1fr;gap:11px;flex:1;min-width:260px}
  .ssub{}
  .ssub .top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px}
  .ssub .top b{font-weight:700}

  .reso{display:flex;gap:13px;padding:14px;border:1px solid var(--line);border-radius:11px;margin-bottom:11px;background:var(--navy)}
  .reso .lv{width:5px;border-radius:5px;flex:0 0 5px}
  .reso h4{margin:0 0 5px;font-size:14px}
  .reso p{margin:0;font-size:13px;color:var(--muted);line-height:1.5}
  .reso .impact{margin-top:7px;font-size:12px;color:var(--gold2);font-weight:600}
  .lvtag{font-size:10.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:2px 8px;border-radius:6px;align-self:flex-start}

  .manual input,.manual select{background:var(--navy);border:1px solid var(--line);color:var(--ink);
    border-radius:8px;padding:8px 10px;font-size:13px;width:100%}
  .manual label{font-size:11.5px;color:var(--muted);display:block;margin-bottom:4px}
  .mg{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;align-items:end}
  @media(max-width:900px){.mg{grid-template-columns:repeat(2,1fr)}}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .chip{background:var(--navy);border:1px solid var(--line);color:var(--muted);padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer}
  .chip.on{background:var(--gold);color:#1a1405;border-color:var(--gold);font-weight:700}
  .muted{color:var(--muted)}
  .note-meta{font-size:12px;color:var(--muted);line-height:1.7}
  .note-meta b{color:var(--ink)}
  .toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .src-indicator{font-size:12.5px;color:var(--muted)}
  .src-indicator b{color:var(--gold2)}
  .footnote{font-size:11.5px;color:var(--muted);margin-top:10px;line-height:1.5}
  .empty{color:var(--muted);text-align:center;padding:30px;font-size:14px}
  .kbar{display:flex;gap:14px;flex-wrap:wrap;font-size:12.5px;color:var(--muted)}
  .err{color:var(--risk);font-size:12.5px;margin-top:8px}
  #settingsPanel input{background:var(--navy);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:8px 10px;font-size:13px;width:100%}
  #settingsPanel label{font-size:11.5px;color:var(--muted);display:block;margin-bottom:4px}
  .cfg-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:900px){.cfg-grid{grid-template-columns:1fr}}
  #gearBtn{font-size:15px;line-height:1}

  /* ---------- Mobile ---------- */
  @media(max-width:760px){
    .wrap{padding:14px 13px 64px}
    header.top{gap:10px}
    .brand{gap:11px}
    .logo{width:36px;height:36px;font-size:17px;border-radius:9px}
    .brand h1{font-size:18px}
    .brand .sub{font-size:11px;line-height:1.35}
    .ctrls{width:100%;gap:8px}
    .seg button{padding:8px 11px}
    .btn{padding:9px 13px}
    .hero{padding:20px 16px}
    .hero h2{font-size:19px}
    .hero p{font-size:13.5px;margin-bottom:18px}
    .grid4{grid-template-columns:1fr 1fr;gap:11px}
    .src{padding:15px}
    nav.tabs{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;min-width:0;max-width:100%}
    nav.tabs::-webkit-scrollbar{display:none}
    nav.tabs button{white-space:nowrap;padding:11px 13px;flex:0 0 auto}
    .toolbar{flex-direction:column;align-items:stretch;gap:10px;margin-bottom:12px;min-width:0}
    .src-indicator{order:2;line-height:2;min-width:0}
    .row>*{min-width:0}
    .cards{grid-template-columns:1fr 1fr;gap:10px}
    .card{padding:13px}
    .card .v{font-size:21px}
    .panel{padding:14px;overflow-x:auto;min-width:0}
    .panel table{min-width:460px}            /* wide tables scroll horizontally inside the panel */
    .cfg-grid{gap:12px}
  }
  @media(max-width:480px){
    .grid4{grid-template-columns:1fr}
    .mg{grid-template-columns:1fr}
    .hero h2{font-size:18px}
    .brand .sub{font-size:10.5px}
    nav.tabs button{font-size:13px;padding:10px 11px}
    .card .v{font-size:20px}
    .card .k{font-size:11px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="logo">W</div>
      <div>
        <h1>WealthLens</h1>
        <div class="sub" id="tagline"></div>
      </div>
    </div>
    <div class="ctrls">
      <div class="seg" id="curSeg"></div>
      <div class="seg" id="langSeg">
        <button data-lang="ru">RU</button>
        <button data-lang="en">EN</button>
      </div>
      <button class="btn ghost" id="gearBtn" title="API / data">⚙︎</button>
      <button class="btn ghost" id="resetBtn" style="display:none"></button>
    </div>
  </header>
  <input type="file" id="fileInp" accept=".csv,.xlsx,.xls,.pdf" multiple style="display:none"/>
  <main id="app"></main>
</div>

/* ---------- helpers ---------- */
const toBase = p => p.value * (FX[p.ccy]||1) / (FX[STATE.base]||1);
function fmtMoney(v){
  const sym = {USD:"$",EUR:"€",CHF:"CHF ",GBP:"£",JPY:"¥"}[STATE.base]||"";
  const a=Math.abs(v); let s;
  if(a>=1e6) s=(v/1e6).toFixed(2)+"M";
  else if(a>=1e3) s=(v/1e3).toFixed(1)+"k";
  else s=v.toFixed(0);
  return sym+s;
}
function fmtFull(v){
  const sym = {USD:"$",EUR:"€",CHF:"CHF ",GBP:"£",JPY:"¥"}[STATE.base]||"";
  return sym+Math.round(v).toLocaleString(STATE.lang==="ru"?"ru-RU":"en-US");
}
const pct = (v,d=1)=> v.toFixed(d)+"%";
const esc = s => String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* ============================================================
   ANALYSIS ENGINE
   ============================================================ */
function analyze(positions){
  const rows = positions.map(p=>{
    const bf = brokerFees(p.broker);
    const baseValue = toBase(p);
    const isCash = p.cls==="cash";
    let entryAmort = 0;
    if(p.cls==="structured_note" && p.entry){ entryAmort = p.entry/(p.tenorYears||3); }
    const advisory = isCash ? 0 : bf.advisory;
    const custody = bf.custody;
    const product = p.feeProduct||0;
    const feePct = advisory + custody + product + entryAmort;     // % p.a.
    const feeAbs = baseValue * feePct/100;
    return Object.assign({}, p, {baseValue, advisory, custody, product, entryAmort, feePct, feeAbs, isCash});
  });

  const aum = rows.reduce((s,r)=>s+r.baseValue,0);
  rows.forEach(r=> r.weight = aum? r.baseValue/aum*100 : 0);

  // group helpers
  const groupSum = key => {
    const m={}; rows.forEach(r=>{ const k=r[key]; m[k]=(m[k]||0)+r.baseValue; }); return m;
  };
  const byClass = groupSum("cls");
  const byBroker = groupSum("broker");
  const byCcy = groupSum("ccy");
  const bySector = groupSum("sector");

  // fees
  const feeAbs = rows.reduce((s,r)=>s+r.feeAbs,0);
  const blendedFee = aum? feeAbs/aum*100 : 0;
  const dragPct = Math.max(0, blendedFee - BENCH);
  const dragAbs = aum*dragPct/100;
  const feeComponents = {
    advisory: rows.reduce((s,r)=>s+r.baseValue*r.advisory/100,0),
    custody:  rows.reduce((s,r)=>s+r.baseValue*r.custody/100,0),
    product:  rows.reduce((s,r)=>s+r.baseValue*r.product/100,0),
    entryAmort: rows.reduce((s,r)=>s+r.baseValue*r.entryAmort/100,0)
  };

  // concentration
  const sorted = [...rows].sort((a,b)=>b.baseValue-a.baseValue);
  const top1 = sorted[0]? sorted[0].weight : 0;
  const top5 = sorted.slice(0,5).reduce((s,r)=>s+r.weight,0);
  const hhi = rows.reduce((s,r)=>s+Math.pow(r.weight,2),0); // 0..10000
  const techShare = (bySector["US Tech"]||0)/aum*100;

  // currency
  const nonBase = Object.entries(byCcy).filter(([c])=>c!==STATE.base).map(([c,v])=>({c,pct:v/aum*100}));
  const largestFx = nonBase.sort((a,b)=>b.pct-a.pct)[0] || {c:null,pct:0};

  // liquidity
  const illiquid = rows.filter(r=>ILLIQUID.has(r.cls)).reduce((s,r)=>s+r.baseValue,0);
  const illiquidPct = aum? illiquid/aum*100 : 0;

  // cash
  const cashPct = (byClass["cash"]||0)/aum*100;

  // structured & derivatives
  const notes = rows.filter(r=>r.cls==="structured_note");
  const derivs = rows.filter(r=>r.cls==="derivative");
  const notionalAbs = derivs.reduce((s,r)=>{ const n=(r.notional||0)*(FX[r.ccy]||1)/(FX[STATE.base]||1); return s+n; },0);
  const leverage = aum? notionalAbs/aum : 0;

  /* ---------- sub-scores (0..100) ---------- */
  const sub = {};
  // Diversification: top1 & HHI
  sub.diversification = clamp(100 - Math.max(0,(top1-8))*4 - Math.max(0,(hhi-700))*0.03 - Math.max(0,(techShare-20))*1.2);
  // Cost: blended fee vs benchmark
  sub.cost = clamp(100 - Math.max(0,(blendedFee-0.30))*55);
  // Currency: largest non-base FX share
  sub.currency = clamp(100 - Math.max(0,(largestFx.pct-15))*2.2);
  // Liquidity
  sub.liquidity = clamp(100 - Math.max(0,(illiquidPct-15))*2.6);
  // Product quality: expensive products + risky notes + leverage
  let pq = 100;
  notes.forEach(n=>{ if((n.barrierDist??30)<20) pq-=12; if((n.entry/(n.tenorYears||3)+n.product)>1.2) pq-=6; });
  rows.forEach(r=>{ if(r.product>=1.5) pq-=5; });
  if(leverage>0.25) pq-= (leverage-0.25)*40;
  sub.quality = clamp(pq);
  // Cash management: ideal 2-8%
  let cs=100; if(cashPct>8) cs-=(cashPct-8)*3.5; if(cashPct<2) cs-=(2-cashPct)*6; sub.cash=clamp(cs);

  const W = {diversification:.25, cost:.25, currency:.10, liquidity:.15, quality:.15, cash:.10};
  const score = Math.round(Object.keys(W).reduce((s,k)=>s+sub[k]*W[k],0));

  return {
    rows, sorted, aum, byClass, byBroker, byCcy, bySector,
    feeAbs, blendedFee, dragPct, dragAbs, feeComponents,
    top1, top5, hhi, techShare, largestFx, nonBase,
    illiquid, illiquidPct, cashPct, notes, derivs, notionalAbs, leverage,
    sub, score, W
  };
}
function clamp(v){ return Math.max(0,Math.min(100,v)); }
function rating(s){ return s>=75?"good": s>=55?"watch":"risk"; }
function ratingLabel(s){ return t(s>=75?"ratingGood": s>=55?"ratingWatch":"ratingRisk"); }
function ratingColor(s){ return s>=75?"var(--good)": s>=55?"var(--watch)":"var(--risk)"; }

/* ---------- resolutions ---------- */
function resolutions(a){
  const R=[]; const L=STATE.lang;
  const add=(level,title,body,impact)=>R.push({level,title,body,impact});

  // concentration
  if(a.top1>10){
    const top=a.sorted[0];
    add("high",
      L==="ru"?"Высокая концентрация в одной позиции":"High single-position concentration",
      L==="ru"?`«${top.name}» занимает ${pct(a.top1)} портфеля (комфортный порог ~10%). Рассмотрите частичную фиксацию или хедж.`
              :`"${top.name}" is ${pct(a.top1)} of the portfolio (comfort threshold ~10%). Consider partial trimming or a hedge.`);
  }
  if(a.techShare>20){
    add("high",
      L==="ru"?"Секторальная концентрация: US Tech":"Sector concentration: US Tech",
      L==="ru"?`${pct(a.techShare)} активов в технологическом секторе США (Apple, Microsoft, NVIDIA, Tesla, Amazon). Высокая корреляция позиций — диверсификация по секторам недостаточна.`
              :`${pct(a.techShare)} of assets sit in US tech (Apple, Microsoft, NVIDIA, Tesla, Amazon). Highly correlated names — sector diversification is thin.`);
  }
  // fees
  if(a.dragPct>0.3){
    const mult=(a.blendedFee/BENCH).toFixed(1);
    add(a.blendedFee>1.2?"high":"medium",
      L==="ru"?"Высокая совокупная стоимость владения":"High total cost of ownership",
      L==="ru"?`Совокупная комиссия ${pct(a.blendedFee,2)}/год — это ${mult}× от индексного бенчмарка (${pct(BENCH,2)}). Основные драйверы: консультационные сборы, активные фонды и альтернативы.`
              :`Blended fee ${pct(a.blendedFee,2)} p.a. — ${mult}× the indexed benchmark (${pct(BENCH,2)}). Main drivers: advisory fees, active funds and alternatives.`,
      L==="ru"?`Потенциальная экономия ≈ ${fmtFull(a.dragAbs)}/год при переходе части портфеля в индексные инструменты.`
              :`Potential saving ≈ ${fmtFull(a.dragAbs)}/yr by indexing part of the portfolio.`);
  }
  // expensive products
  const exp=a.rows.filter(r=>r.product>=1.5).sort((x,y)=>y.feeAbs-x.feeAbs);
  exp.slice(0,2).forEach(r=>{
    add("medium",
      L==="ru"?`Дорогой продукт: ${r.name}`:`Expensive product: ${r.name}`,
      L==="ru"?`${pct(r.product,2)}/год${r.perf?` + ${r.perf}% performance fee`:""} (≈ ${fmtFull(r.baseValue*r.product/100)}/год только по продукту). Оцените, оправдывает ли результат стоимость.`
              :`${pct(r.product,2)} p.a.${r.perf?` + ${r.perf}% performance fee`:""} (≈ ${fmtFull(r.baseValue*r.product/100)}/yr in product fees alone). Assess whether performance justifies the cost.`);
  });
  // notes
  a.notes.forEach(n=>{
    if((n.barrierDist??30)<20){
      add(n.barrierDist<13?"high":"medium",
        L==="ru"?`Нота под риском барьера: ${n.name}`:`Barrier risk: ${n.name}`,
        L==="ru"?`Базовый актив ${n.underlying} лишь в ${pct(n.barrierDist,0)} от защитного барьера (${n.barrier}%). При пробое барьера капитал-протекции нет — убыток повторяет падение базового актива.`
                :`${n.underlying} is only ${pct(n.barrierDist,0)} above the protection barrier (${n.barrier}%). No capital protection if breached — losses track the underlying.`);
    }
    const emb=(n.entry||0)+ (n.tenorYears||3)*(n.product||0);
    add("low",
      L==="ru"?`Зашитая стоимость ноты: ${n.name}`:`Embedded cost: ${n.name}`,
      L==="ru"?`Входная комиссия ${pct(n.entry||0,1)} + ${pct(n.product||0,1)}/год структурной маржи. Купон ${pct(n.coupon||0,1)} частично уходит на издержки эмитента/дистрибьютора.`
              :`Entry fee ${pct(n.entry||0,1)} + ${pct(n.product||0,1)} p.a. structuring margin. Part of the ${pct(n.coupon||0,1)} coupon funds issuer/distributor costs.`);
  });
  // derivatives
  if(a.leverage>0.10){
    const lvHigh=a.leverage>0.25;
    add(lvHigh?"medium":"low",
      L==="ru"?"Контроль плеча по деривативам":"Derivative leverage check",
      L==="ru"?`Совокупный условный номинал ≈ ${fmtFull(a.notionalAbs)} = ${a.leverage.toFixed(2)}× капитала. ${lvHigh?"Высокое плечо — нужен маржинальный контроль.":"Преимущественно защитные позиции — приемлемо."}`
              :`Aggregate notional ≈ ${fmtFull(a.notionalAbs)} = ${a.leverage.toFixed(2)}× equity. ${lvHigh?"Elevated leverage — monitor margin.":"Mostly protective — acceptable."}`);
  }
  a.derivs.forEach(d=>{
    const dt=parseDate(d.expiry); if(dt){ const dl=daysBetween(TODAY,dt); if(dl<120 && dl>=0)
      add("low",
        L==="ru"?`Скоро экспирация: ${d.name}`:`Expiring soon: ${d.name}`,
        L==="ru"?`До экспирации ${dl} дн. — нужно решение: ролл, закрытие или замена хеджа.`
                :`${dl} days to expiry — decide: roll, close or replace the hedge.`);
    }
  });
  // currency
  if(a.largestFx.pct>15){
    add("medium",
      L==="ru"?"Валютный перекос":"Currency mismatch",
      L==="ru"?`${pct(a.largestFx.pct)} активов в ${a.largestFx.c} при базовой валюте ${STATE.base}. Несогласованность с базой — рассмотрите частичное хеджирование FX.`
              :`${pct(a.largestFx.pct)} of assets in ${a.largestFx.c} against ${STATE.base} base. Consider partial FX hedging.`);
  }
  // liquidity
  if(a.illiquidPct>15){
    add(a.illiquidPct>30?"high":"medium",
      L==="ru"?"Повышенная неликвидность":"Elevated illiquidity",
      L==="ru"?`${pct(a.illiquidPct)} в структурных нотах и альтернативах (hedge/PE, частично с локап-периодом). Сверьте с потребностью клиента в ликвидности и обязательствами.`
              :`${pct(a.illiquidPct)} in structured notes and alternatives (hedge/PE, partly locked-up). Reconcile with the client's liquidity needs and commitments.`);
  }
  // cash
  if(a.cashPct>8){
    add("medium",
      L==="ru"?"Избыточный кэш":"Excess cash",
      L==="ru"?`${pct(a.cashPct)} в денежных средствах (≈ ${fmtFull(a.byClass.cash||0)}). Денежный «drag» на доходность — рассмотрите размещение в money-market или короткие бонды.`
              :`${pct(a.cashPct)} in cash (≈ ${fmtFull(a.byClass.cash||0)}). Cash drag on returns — consider money-market or short bonds.`);
  } else if(a.cashPct<2){
    add("low",
      L==="ru"?"Низкий буфер ликвидности":"Thin liquidity buffer",
      L==="ru"?`Кэш ${pct(a.cashPct)} — мало для покрытия неожиданных оттоков/маржи без вынужденных продаж.`
              :`Cash at ${pct(a.cashPct)} — thin for covering unexpected outflows/margin without forced sales.`);
  }

  const order={high:0,medium:1,low:2};
  return R.sort((x,y)=>order[x.level]-order[y.level]);
}

/* ============================================================
   SVG widgets
   ============================================================ */
function donut(segments, size=190){
  const total=segments.reduce((s,x)=>s+x.value,0)||1;
  const r=size/2-14, cx=size/2, cy=size/2, C=2*Math.PI*r; let off=0;
  const arcs=segments.map(s=>{
    const frac=s.value/total, len=C*frac;
    const el=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="22"
      stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 ${cx} ${cy})"/>`;
    off+=len; return el;
  }).join("");
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    ${arcs}
    <circle cx="${cx}" cy="${cy}" r="${r-13}" fill="var(--panel)"/>
  </svg>`;
}
function gauge(score){
  const size=170,r=70,cx=size/2,cy=size/2, C=Math.PI*r; // half circle
  const frac=score/100, col=ratingColor(score);
  return `<svg width="${size}" height="${size/2+26}" viewBox="0 0 ${size} ${size/2+26}">
    <path d="M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}" fill="none" stroke="var(--navy)" stroke-width="16" stroke-linecap="round"/>
    <path d="M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}" fill="none" stroke="${col}" stroke-width="16" stroke-linecap="round"
      stroke-dasharray="${C*frac} ${C}"/>
    <text x="${cx}" y="${cy-6}" text-anchor="middle" font-size="38" font-weight="800" fill="var(--ink)">${score}</text>
    <text x="${cx}" y="${cy+16}" text-anchor="middle" font-size="12" fill="var(--muted)">/ 100</text>
  </svg>`;
}

async function fetchJSON(url, ms=7000){
  const ctl=new AbortController(), to=setTimeout(()=>ctl.abort(), ms);
  try{ const r=await fetch(url,{signal:ctl.signal}); if(!r.ok) throw new Error("HTTP "+r.status); return await r.json(); }
  finally{ clearTimeout(to); }
}
function applyFxRates(rates, date, source){
  const f={USD:1};                                   // Frankfurter gives units-of-CODE per 1 USD; our FX is USD per 1 unit => invert
  ["EUR","CHF","GBP","JPY"].forEach(s=>{ const v=+rates[s]; f[s]= v>0 ? 1/v : FX_EMBED[s]; });
  FX=f; DATA.fx={status:"live", asOf:(date||"").toString().slice(0,10), source};
}
function cacheFx(){ try{ localStorage.setItem("wl_fx", JSON.stringify({fx:FX, meta:DATA.fx, ts:Date.now()})); }catch(e){} }
function loadFxCache(){ try{ const c=JSON.parse(localStorage.getItem("wl_fx")||"null"); if(!c||!c.fx) return false;
  FX=c.fx; DATA.fx=Object.assign({}, c.meta, {status:"stale"}); return true; }catch(e){ return false; } }

async function refreshFX(){
  const base=backendBase();
  if(base){ try{ const j=await fetchJSON(base+"/fx?base=USD"); applyFxRates(j.rates||j, j.date, j.source?("backend · "+j.source):"backend"); cacheFx(); return; }catch(e){} }
  try{ const j=await fetchJSON("https://api.frankfurter.dev/v1/latest?base=USD&symbols=EUR,CHF,GBP,JPY"); applyFxRates(j.rates, j.date, "Frankfurter · ECB"); cacheFx(); return; }catch(e){}
  try{ const j=await fetchJSON("https://open.er-api.com/v6/latest/USD"); if(j.result==="success"){ applyFxRates(j.rates, (j.time_last_update_utc||"").slice(0,16), "open.er-api"); cacheFx(); return; } }catch(e){}
  try{ const j=await fetchJSON("https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json"); const u=j.usd||{}; applyFxRates({EUR:u.eur,CHF:u.chf,GBP:u.gbp,JPY:u.jpy}, j.date, "currency-api"); cacheFx(); return; }catch(e){}
  if(!loadFxCache()){ FX=Object.assign({},FX_EMBED); DATA.fx={status:"embedded", asOf:FX_DATE_EMBED, source:"embedded"}; }
}
async function refreshPrices(){
  if(!STATE.positions) return {updated:0,total:0};
  const targets=STATE.positions.filter(p=>p.ticker && p.qty>0);
  let updated=0; const base=backendBase();
  if(base){
    try{ const ids=targets.map(p=>p.ticker).join(",");
      const j=await fetchJSON(base+"/quote?symbols="+encodeURIComponent(ids), 45000);   // live scraping is slow; allow up to 45s
      targets.forEach(p=>{ const raw=j[p.ticker]; const q=+(raw&&raw.price!=null?raw.price:raw); if(q>0){ p.value=p.qty*q; updated++; } });
      DATA.prices={status:"live", source:"backend · "+(j._provider||""), updated, total:targets.length}; return {updated,total:targets.length};
    }catch(e){}
  }
  if(DATA.cfg.finnhubKey){
    for(const p of targets){ try{
      const j=await fetchJSON("https://finnhub.io/api/v1/quote?symbol="+encodeURIComponent(p.ticker)+"&token="+encodeURIComponent(DATA.cfg.finnhubKey));
      if(j && +j.c>0){ p.value=p.qty*(+j.c); updated++; }   // c===0 && t===0 => no quote; keep embedded
    }catch(e){} }
    DATA.prices={status: updated?"live":"embedded", source:"Finnhub", updated, total:targets.length}; return {updated,total:targets.length};
  }
  DATA.prices={status:"embedded", source:"embedded", updated:0, total:targets.length}; return {updated:0,total:targets.length};
}

  const st=$("#cfg_status"); const say=m=>{ if(st) st.textContent=m; };

function vStructured(a){

function noteCard(n){
  const dt=parseDate(n.maturity); const dl=dt?daysBetween(TODAY,dt):null;
  const emb=((n.entry||0)+(n.tenorYears||3)*(n.product||0)).toFixed(1);
  const bd=n.barrierDist??null;
  const bcol=bd==null?"var(--muted)":(bd<13?"var(--risk)":bd<20?"var(--watch)":"var(--good)");
  return `<div style="border:1px solid var(--line);border-radius:11px;padding:15px;background:var(--navy)">
    <div style="display:flex;justify-content:space-between;gap:10px"><b>${esc(n.name)}</b><span class="muted">${esc(n.broker)}</span></div>
    <div style="margin:6px 0 10px;font-size:13px">${fmtFull(n.baseValue)} · ${pct(n.weight)} ${t("weightLbl")}</div>
    <div class="note-meta">
      ${t("underlying")}: <b>${esc(n.underlying||"—")}</b><br/>
      ${t("coupon")}: <b>${pct(n.coupon||0,1)}</b> · ${t("capProt")}: <b>${n.capProt?pct(n.capProt,0):"0%"}</b><br/>
      ${t("barrier")}: <b>${n.barrier||"—"}%</b> · ${t("barrierDist")}: <b style="color:${bcol}">${bd!=null?pct(bd,0):"—"}</b><br/>
      ${t("maturity")}: <b>${n.maturity||"—"}</b>${dl!=null?` <span class="muted">(${dl} ${t("daysLeft")})</span>`:""}<br/>
      ${t("embedded")}: <b style="color:var(--watch)">≈ ${emb}%</b> <span class="muted">(${pct(n.entry||0,1)} + ${pct(n.product||0,1)}/${STATE.lang==="ru"?"г":"y"}×${n.tenorYears||3})</span>
    </div>
  </div>`;
}
function derivCard(d){
  const dt=parseDate(d.expiry); const dl=dt?daysBetween(TODAY,dt):null;
  return `<div style="border:1px solid var(--line);border-radius:11px;padding:15px;background:var(--navy);margin-bottom:11px">
    <div style="display:flex;justify-content:space-between"><b>${esc(d.name)}</b><span class="muted">${esc(d.broker)}</span></div>
    <div class="kbar" style="margin-top:9px">

    </div></div>`;
}

/* ---------- Fees ---------- */
function vFees(a){
  const comp=a.feeComponents;
  const compRows=[["advisory",comp.advisory],["custody",comp.custody],["product",comp.product],["entryAmort",comp.entryAmort]];
  const compMax=Math.max(...compRows.map(c=>c[1]))||1;
  const exp=[...a.rows].filter(r=>r.feeAbs>0).sort((x,y)=>y.feeAbs-x.feeAbs).slice(0,8);
  const expMax=exp[0]?exp[0].feeAbs:1;
  const proj10=a.feeAbs*10, projBench=a.aum*BENCH/100*10;

  return `<div class="cards">
      ${card(t("kFee"),pct(a.blendedFee,2),t("perYear"))}
      ${card(STATE.lang==="ru"?"Издержки в год":"Annual cost",fmtMoney(a.feeAbs),STATE.base)}
      ${card(t("kDrag"),fmtMoney(a.dragAbs),`vs ${pct(BENCH,2)} bench`)}
      ${card(t("proj"),fmtMoney(proj10),`vs ${fmtMoney(projBench)} bench`)}
    </div>
    <div class="row">
      <div class="panel"><h3>${t("feeComp")}</h3>${a.feeAbs?compRows.map(([k,v])=>`
        <div><div class="li"><span class="lbl">${t(k)}</span><span>${fmtMoney(v)} · <b>${pct(a.aum?v/a.aum*100:0,2)}</b></span></div>
        <div class="bar"><i style="width:${v/compMax*100}%;background:var(--gold)"></i></div></div>`).join(""):`<div class="empty">—</div>`}
        <div class="footnote">${STATE.lang==="ru"?"Бенчмарк — индексный портфель ~0.20%/год. Разница = fee-drag.":"Benchmark — indexed portfolio ~0.20% p.a. The gap = fee drag."}</div>
      </div>
      <div class="panel"><h3>${t("feeVsBench")}</h3>
        ${barCompare(t("yourPort"),a.blendedFee, t("benchPort"),BENCH, Math.max(a.blendedFee,BENCH))}
        <div class="panel" style="margin-top:14px;background:var(--navy)"><h3 style="margin-bottom:8px">${t("proj")}</h3>
          ${barCompare(t("yourPort"),proj10, t("benchPort"),projBench, Math.max(proj10,projBench),true)}
          <div class="footnote">${t("projNote")}</div>
        </div>
      </div>
    </div>
    <div class="panel"><h3>${t("mostExp")}</h3>
      <table><thead><tr><th>${t("instrument")}</th><th>${t("broker")}</th><th class="num">${t("feeY")}</th><th class="num">${STATE.base}/${t("perYear")}</th><th></th></tr></thead>
      <tbody>${exp.map(r=>`<tr><td>${esc(r.name)}</td><td class="muted">${esc(r.broker)}</td>

    </div>`;
}
function barCompare(l1,v1,l2,v2,max,money){
  const f=money?fmtMoney:(x)=>pct(x,2);
  return `<div><div class="li"><span class="lbl">${l1}</span><b>${f(v1)}</b></div>
      <div class="bar" style="height:13px"><i style="width:${v1/max*100}%;background:var(--risk)"></i></div></div>
    <div style="margin-top:12px"><div class="li"><span class="lbl">${l2}</span><b>${f(v2)}</b></div>
      <div class="bar" style="height:13px"><i style="width:${v2/max*100}%;background:var(--good)"></i></div></div>`;
}

function vHealth(a){
  const subs=[
    ["cDiversification",a.sub.diversification,`top-1 ${pct(a.top1)} · ${t("techConc")} ${pct(a.techShare)}`],
    ["cCost",a.sub.cost,`${pct(a.blendedFee,2)} ${t("perYear")} · drag ${pct(a.dragPct,2)}`],
    ["cCurrency",a.sub.currency, a.largestFx.c?`${a.largestFx.c} ${pct(a.largestFx.pct)}`:"—"],
    ["cLiquidity",a.sub.liquidity,`${t("illiquidShare")} ${pct(a.illiquidPct)}`],
    ["cQuality",a.sub.quality,`${a.notes.length} ${STATE.lang==="ru"?"нот":"notes"} · ${a.leverage.toFixed(2)}× lev`],

/* ---------- file parsing ---------- */
const HEADER_MAP = {
  broker:["broker","брокер","custodian","bank","банк"],
  name:["name","instrument","security","описание","наименование","название","инструмент","ценная бумага"],
  cls:["class","asset class","assetclass","type","класс","класс актива","тип"],
  ccy:["currency","ccy","валюта","cur"],
  value:["value","market value","amount","стоимость","сумма","рыночная стоимость","mv"],
  quantity:["quantity","qty","количество","кол-во"],
  price:["price","цена","last","курс"],
  feeProduct:["fee","ter","expense","комиссия","комис","fee product","product fee"],
  ticker:["ticker","symbol","тикер","символ","bbg","bloomberg ticker"],
  isin:["isin","изин"],
  sector:["sector","сектор","industry","отрасль"],
  coupon:["coupon","купон"], barrier:["barrier","барьер"], maturity:["maturity","погашение","maturity date"],
  underlying:["underlying","базовый","базовый актив"], notional:["notional","номинал"], dtype:["derivative type","тип дерив  атива"]
};
const CLASS_MAP = {
  equity:["equity","equities","stock","акц","акция","акции"],
  bond:["bond","bonds","fixed income","облиг","бонд"],
  fund_etf:["fund","etf","mutual","фонд","etf"],
  structured_note:["structured","note","нота","ноты","структ"],
  derivative:["derivative","option","future","swap","дериватив","опцион","фьючерс"],
  cash:["cash","кэш","деньги","money market","нал"],
  alternative:["alternative","hedge","private equity","альтернатив","хедж","pe"]
};
function normClass(s){
  const x=String(s||"").toLowerCase();
  for(const [k,list] of Object.entries(CLASS_MAP)) if(list.some(w=>x.includes(w))) return k;
  return "equity";
}
function mapHeaders(headers){
  const lower=headers.map(h=>String(h||"").trim().toLowerCase());
  const map={};
  for(const [field,syn] of Object.entries(HEADER_MAP)){
    const idx=lower.findIndex(h=> syn.some(s=> h===s || h.includes(s)));
    if(idx>=0) map[field]=idx;
  }
  return map;
}
function rowsToPositions(matrix){
  if(!matrix.length) return [];
  const headers=matrix[0]; const map=mapHeaders(headers);
  if(map.name==null && map.value==null && map.quantity==null) return []; // not recognizable
  const out=[];
  for(let i=1;i<matrix.length;i++){
    const r=matrix[i]; if(!r || !r.length || r.every(c=>c===""||c==null)) continue;
    const g=f=> map[f]!=null? r[map[f]] : undefined;
    let value=parseNum(g("value"));
    if(!value && g("quantity")!=null && g("price")!=null) value=parseNum(g("quantity"))*parseNum(g("price"));
    if(!value) continue;
    const p={
      broker: (g("broker")||"—").toString().trim(),
      name: (g("name")||("Position "+i)).toString().trim(),
      cls: normClass(g("cls")),
      ccy: (String(g("ccy")||"USD").toUpperCase().match(/[A-Z]{3}/)||["USD"])[0],
      value, feeProduct: parseNum(g("feeProduct"))||0, sector:(g("sector")||"").toString()
    };
    ["coupon","barrier","maturity","underlying","notional"].forEach(f=>{ const v=g(f); if(v!=null&&v!=="") p[f]=isNaN(+v)?v:+v; });
    const tk=g("ticker"); if(tk) p.ticker=String(tk).trim().toUpperCase();
    const isin=g("isin"); if(isin) p.isin=String(isin).trim().toUpperCase();
    const qn=parseNum(g("quantity")); if(qn) p.qty=qn;
    if(!FX[p.ccy]) p.ccy="USD";
    out.push(p);
  }
  return out;
}
function parseNum(v){   // handles US (1,234.56), EU (1.234,56) and Swiss (1'234.56) number formats
  if(v==null) return 0;
  let t=String(v).replace(/[\s'’ ]/g,"").replace(/[^\d.,\-]/g,"");
  const hasC=t.indexOf(",")>-1, hasD=t.indexOf(".")>-1;
  if(hasC && hasD){ if(t.lastIndexOf(",")>t.lastIndexOf(".")) t=t.replace(/\./g,"").replace(/,/g,"."); else t=t.replace(/,/g,""); }
  else if(hasC){ if(/^-?\d+,\d{1,2}$/.test(t)) t=t.replace(",","."); else t=t.replace(/,/g,""); }
  else if(hasD && (t.match(/\./g)||[]).length>1){ t=t.replace(/\./g,""); }
  const n=parseFloat(t); return isNaN(n)?0:n;
}

// Accepts MULTIPLE files (CSV / Excel / PDF) and ACCUMULATES them into one consolidated portfolio.
async function handleFiles(fileList){
  const files=Array.from(fileList||[]); if(!files.length) return;
  const le=$("#landErr"); if(le){ le.textContent=""; le.className="muted"; }
  let added=0; const failed=[]; let pdfHeur=false, pdfText="";
  for(const file of files){
    try{
      let positions=[];
      if(/\.pdf$/i.test(file.name)){
        const r=await parsePdfFile(file); positions=r.positions; pdfHeur=true; if(!positions.length) pdfText=r.text;
      } else if(/\.csv$/i.test(file.name)){
        positions=rowsToPositions(parseCSV(await file.text()));
      } else {
        if(!window.XLSX) throw 0;
        const wb=XLSX.read(new Uint8Array(await file.arrayBuffer()),{type:"array"});
        positions=rowsToPositions(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:""}));
      }
      if(!positions.length){ failed.push(file.name); continue; }
      const fname=file.name.replace(/\.[^.]+$/,"");
      positions.forEach(p=>{ if(!p.broker || p.broker==="—" || p.broker==="PDF") p.broker=fname; });   // tag by file/bank
      added+=addPositions(positions, file.name);
    }catch(e){ failed.push(file.name); }
  }
  if(le){
    const ru=STATE.lang==="ru";
    if(added>0){ le.className="muted";
      le.textContent=(ru?`Добавлено позиций: ${added}.`:`Added ${added} positions.`)
        +(failed.length?(ru?` Не распознаны: ${failed.join(", ")}.`:` Not parsed: ${failed.join(", ")}.`):"")
        +(pdfHeur?` ${t("pdfHeur")}`:""); }
    else { le.className="err";
      le.textContent=ru?"Не удалось распознать файл(ы). Надёжнее — CSV/Excel-экспорт из брокера (кнопка «Скачать шаблон»).":"Could not parse the file(s). A CSV/Excel export from the broker (Download template) is the reliable path.";
      if(pdfText) console.log("[WealthLens] extracted PDF text:\n"+pdfText); }
  }
}
function showFileErr(){ const le=$("#landErr"); if(le){ le.textContent=t("fileErr"); le.className="err"; } }

function parseCSV(text){
  const rows=[]; let row=[],cur="",q=false;
  for(let i=0;i<text.length;i++){ const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else { if(c==='"') q=true; else if(c===","||c===";"){ row.push(cur);cur=""; }
      else if(c==="\n"){ row.push(cur);rows.push(row);row=[];cur=""; }
      else if(c==="\r"){} else cur+=c; }
  }
  if(cur!==""||row.length){ row.push(cur); rows.push(row); }
  return rows.filter(r=>r.length>1 || (r.length===1&&r[0]!==""));
}

// Extract text from a PDF and return {positions, text}. Best-effort — CSV/Excel is the reliable path.
async function parsePdfFile(file){
  if(!window.pdfjsLib) return {positions:[], text:""};
  pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  const pdf=await pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;
  const lines=[];
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p); const tc=await page.getTextContent();
    const byY={};
    tc.items.forEach(it=>{ const y=Math.round(it.transform[5]); (byY[y]=byY[y]||[]).push(it); });
    Object.keys(byY).sort((a,b)=>b-a).forEach(y=>{
      const txt=byY[y].sort((a,b)=>a.transform[4]-b.transform[4]).map(i=>i.str).join(" ").replace(/\s+/g," ").trim();
      if(txt) lines.push(txt);
    });
  }
  return {positions:pdfLinesToPositions(lines), text:lines.join("\n")};
}
// Heuristic row detection: a line with a name + amounts (+ optional ISIN/currency). Best-effort.
function pdfLinesToPositions(lines){
  const out=[];
  const ccyRe=/\b(USD|EUR|CHF|GBP|JPY|CAD|AUD|SEK|NOK|DKK|HKD|SGD|CNY)\b/;
  const isinRe=/\b([A-Z]{2}[A-Z0-9]{9}\d)\b/;
  const skipRe=/\b(total|subtotal|sub-total|page|statement|portfolio|valuation|balance|summary|as of|account|grand|итого|всего|страниц|выписк|оценк|баланс|сч[её]т|дата)\b/i;
  lines.forEach(ln=>{
    if(ln.length<4 || skipRe.test(ln)) return;
    const isin=(ln.match(isinRe)||[])[1];
    const body=ln.replace(isinRe," ");                   // drop ISIN first so its digits aren't read as a value
    const toks=body.match(/-?\d[\d.,'’]*\d|\b\d\b/g);
    if(!toks) return;
    const vals=toks.map(parseNum).filter(v=>v>0);
    if(!vals.length) return;
    const val=Math.max.apply(null, vals);
    if(val<100) return;                                  // skip page numbers / tiny figures
    const ccy=(body.match(ccyRe)||["USD"])[0];
    let name=body.replace(ccyRe," ").replace(/-?\d[\d.,'’%]*/g," ").replace(/\s+/g," ").trim();
    if(name.length<2) return;
    const p={broker:"PDF", name:name.slice(0,60), cls:normClass(name), ccy, value:val, feeProduct:0, sector:""};
    if(isin) p.isin=isin;
    out.push(p);
  });
  return out.slice(0,100);
}
